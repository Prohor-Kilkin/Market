{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-9 bg-white p-4 mb-5 mx-2 rounded custom-shadow">
                <h2 class="text-center mb-4">Регистрация</h2>
                <form action="{% url 'user:registration' %}" method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="id_first_name" class="form-label">Имя*</label>
                            <input type="text"
                                   class="form-control"
                                   id="id_first_name"
                                   name="first_name"
                                   value="{% if form.first_name.value %}{{ form.first_name.value }}{% endif %}"
                                   placeholder="Введите ваше имя" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="id_last_name" class="form-label">Фамилия*</label>
                            <input type="text"
                                   class="form-control"
                                   id="id_last_name"
                                   name="last_name"
                                   value="{% if form.last_name.value %}{{ form.last_name.value }}{% endif %}"
                                   placeholder="Введите вашу фамилию" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="id_username" class="form-label">Имя пользователя*</label>
                            <input type="text"
                                   class="form-control"
                                   id="id_username"
                                   name="username"
                                   value="{% if form.username.value %}{{ form.username.value }}{% endif %}"
                                   placeholder="Введите ваше имя пользователя" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="id_email" class="form-label">Email*</label>
                            <input type="email"
                                   class="form-control"
                                   name="email"
                                   value="{% if form.email.value %}{{ form.email.value }}{% endif %}"
                                   id="id_email"
                                   placeholder="Введите ваш email" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="password1" class="form-label">Пароль*</label>
                            <input type="password" class="form-control" id="password1"
                                placeholder="Введите пароль" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="password2" class="form-label">Подтверждение пароля*</label>
                            <input type="password" class="form-control" id="password2"
                                placeholder="Подтвердите пароль" required>
                        </div>
                    </div>
                    <button type="submit"
                        class="btn btn-dark btn-block">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock%}
